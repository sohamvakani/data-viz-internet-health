<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Internet Access vs Life Expectancy</title>
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src ="https://d3js/org/topojson.v3.min.js"></script>
  </head>
  <body>
    <header>
      <h1>Digital Access & Health: Internet Usage vs Life Expectancy</h1>
      <p><strong>By Soham Vakani</strong></p>
      <p><strong>Data Year:</strong> 2023 | <strong>Countries:</strong> 182</p>
      <p>
        Data source: <a href="https://ourworldindata.org/">Our World in Data</a>
      </p>
    </header>

    <main>
      <section id="maps-section">
        <div class ="map-container">
          <h2>Internet Access Distribution</h2>
          <div id = "map-internet"></div>
        </div>
        
        <div class ="map-container">
          <h2>Life Expectancy Distribution</h2>
          <div id = "map-life"</div>
        </div>
      </section>
      
      <section id="visualizations">
        <div class="chart-container">
          <h2>Internet Access Distribution</h2>
          <div id="histogram-internet"></div>
        </div>

        <div class="chart-container">
          <h2>Life Expectancy Distribution</h2>
          <div id="histogram-life"></div>
        </div>

        <div class="chart-container full-width">
          <h2>Internet Access vs Life Expectancy</h2>
          <div id="scatterplot"></div>
        </div>
      </section>
    </main>

    <script src="js/main.js"></script>
  </body>
</html>
